<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Kinetic Oasis 手机版加油日志，可查看、筛选、编辑和删除本地记录。">
  <meta name="theme-color" content="#4d6300">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kinetic Oasis">
  <title>Kinetic Oasis - 加油日志</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="logs" data-nav-group="logs">
  <header class="topbar">
    <a class="icon-button" href="./index.html" aria-label="返回仪表盘">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M15 18 9 12l6-6"></path>
      </svg>
    </a>
    <div class="topbar-brand topbar-brand-centered">
      <div class="brand-copy">
        <p class="eyebrow">Fuel Records</p>
        <h1 class="brand-title">加油日志</h1>
      </div>
    </div>
    <a class="icon-button icon-button-primary" href="./add.html" aria-label="添加记录">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </svg>
    </a>
  </header>

  <div class="app-shell">
    <main class="main-stack">
      <p class="notice-banner" id="pageFlash" hidden></p>

      <section class="hero-card hero-primary">
        <div class="hero-layout">
          <div>
            <p class="hero-kicker">当前筛选支出</p>
            <div class="hero-row">
              <h2 class="hero-heading hero-heading-money" id="logsFilteredSpend">¥ 0.00</h2>
            </div>
          </div>
          <div class="hero-chip-row">
            <span class="hero-chip">记录数：<strong id="logsFilteredCount">0 条</strong></span>
            <span class="hero-chip">总油量：<strong id="logsFilteredLiters">0.00 L</strong></span>
          </div>
          <p class="hero-copy" id="logsFilterSummary">当前展示 0 条记录。</p>
        </div>
      </section>

      <section class="panel soft">
        <div class="section-head">
          <div>
            <p class="section-title">筛选条件</p>
            <h2>快速定位记录</h2>
          </div>
        </div>
        <div class="filters-grid">
          <label class="field">
            <span class="field-label">月份</span>
            <div class="field-control">
              <select class="field-select" id="logsMonthFilter"></select>
            </div>
          </label>
          <label class="field">
            <span class="field-label">燃油类型</span>
            <div class="field-control">
              <select class="field-select" id="logsFuelFilter"></select>
            </div>
          </label>
          <label class="field">
            <span class="field-label">油站</span>
            <div class="field-control">
              <select class="field-select" id="logsStationFilter"></select>
            </div>
          </label>
          <label class="field">
            <span class="field-label">关键词</span>
            <div class="field-control">
              <input class="field-input" id="logsSearch" type="search" placeholder="搜索油站、备注或日期">
            </div>
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="section-title">记录列表</p>
            <h2>按日期倒序</h2>
          </div>
        </div>
        <div class="record-list" id="logsList"></div>
      </section>
      <div class="spacer-bottom"></div>
    </main>
  </div>

  <a class="fab" href="./add.html" aria-label="新增记录">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 5v14"></path>
      <path d="M5 12h14"></path>
    </svg>
  </a>

  <div class="bottom-nav-wrap">
    <nav class="bottom-nav" aria-label="主导航">
      <a class="nav-item" href="./index.html" data-nav="dashboard">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 12.5 12 5l8 7.5"></path>
          <path d="M6.5 10.5V19h11v-8.5"></path>
        </svg>
        <span class="nav-label">仪表盘</span>
      </a>
      <a class="nav-item" href="./logs.html" data-nav="logs">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 6h10"></path>
          <path d="M7 12h10"></path>
          <path d="M7 18h10"></path>
          <path d="M4 6h.01"></path>
          <path d="M4 12h.01"></path>
          <path d="M4 18h.01"></path>
        </svg>
        <span class="nav-label">记录</span>
      </a>
      <a class="nav-item" href="./stats.html" data-nav="stats">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 18h16"></path>
          <path d="M7 15V9"></path>
          <path d="M12 15V6"></path>
          <path d="M17 15v-3"></path>
        </svg>
        <span class="nav-label">趋势</span>
      </a>
      <a class="nav-item" href="./add.html" data-nav="add">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
        <span class="nav-label">新增</span>
      </a>
    </nav>
  </div>

  <script src="./app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Kinetic Oasis 手机版添加或编辑加油记录。">
  <meta name="theme-color" content="#4d6300">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kinetic Oasis">
  <title>Kinetic Oasis - 添加记录</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="add" data-nav-group="add">
  <header class="topbar">
    <a class="icon-button" href="./logs.html" aria-label="关闭并返回记录">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M6 6l12 12"></path>
        <path d="M18 6 6 18"></path>
      </svg>
    </a>
    <div class="topbar-brand topbar-brand-centered">
      <div class="brand-copy">
        <p class="eyebrow">Fuel Entry</p>
        <h1 class="brand-title" id="addPageHeading">添加加油记录</h1>
        <p class="page-subtitle" id="addPageHint"></p>
      </div>
    </div>
    <span class="brand-mark brand-mark-static" aria-hidden="true">KO</span>
  </header>

  <div class="app-shell">
    <main class="main-stack">
      <section class="hero-card hero-primary">
        <div class="hero-layout">
          <div>
            <p class="hero-kicker">总支出</p>
            <div class="hero-row">
              <h2 class="hero-heading hero-heading-money" id="addTotalAmount">0.00</h2>
              <span class="hero-unit">CNY</span>
            </div>
          </div>
        </div>
      </section>

      <form class="form-stack" id="fuelForm">
        <section class="panel soft">
          <div class="field-grid entry-grid">
            <label class="field">
              <span class="field-label">交易日期</span>
              <div class="field-control">
                <input class="field-input" id="recordDate" type="date" required>
              </div>
            </label>
            <label class="field">
              <span class="field-label">当前里程 (km)</span>
              <div class="field-control">
                <input class="field-input" id="recordOdometer" type="number" min="0" step="1" placeholder="请输入当前里程" required>
              </div>
            </label>
            <label class="field">
              <span class="field-label">加油量 (L)</span>
              <div class="field-control">
                <input class="field-input" id="recordLiters" type="number" min="0" step="0.01" placeholder="0.00" required>
              </div>
            </label>
            <label class="field">
              <span class="field-label">单价 (¥/L)</span>
              <div class="field-control">
                <input class="field-input" id="recordUnitPrice" type="number" min="0" step="0.01" placeholder="0.00" required>
              </div>
            </label>
          </div>

          <div class="field">
            <span class="field-label">燃油类型</span>
            <div class="chip-group" id="fuelTypeGroup">
              <button class="chip-button" type="button" data-fuel-type="92# 汽油">92# 汽油</button>
              <button class="chip-button" type="button" data-fuel-type="95# 汽油">95# 汽油</button>
              <button class="chip-button" type="button" data-fuel-type="98# 汽油">98# 汽油</button>
              <button class="chip-button" type="button" data-fuel-type="柴油">柴油</button>
            </div>
          </div>

          <label class="field">
            <span class="field-label">油站名称</span>
            <div class="field-control">
              <input class="field-input" id="recordStation" type="text" maxlength="48" placeholder="例如：中石化科技园站">
            </div>
          </label>

          <label class="field">
            <span class="field-label">备注</span>
            <div class="field-control input-block">
              <textarea class="field-textarea" id="recordNote" placeholder="例如：节假日前加满"></textarea>
            </div>
          </label>

          <div class="toggle-row">
            <div class="toggle-copy">
              <strong>本次已加满</strong>
              <span>满油记录会参与油耗区间计算</span>
            </div>
            <label class="toggle-switch">
              <input id="recordFullTank" type="checkbox">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </section>

        <p class="form-message" id="addFormMessage" hidden></p>

        <div class="button-row">
          <button class="button" type="submit">确认并保存</button>
          <a class="button-secondary" href="./logs.html">取消</a>
          <div id="deleteRecordWrap" hidden>
            <button class="button button-danger" id="deleteRecordButton" type="button">删除当前记录</button>
          </div>
        </div>
      </form>
      <div class="spacer-bottom"></div>
    </main>
  </div>

  <div class="bottom-nav-wrap">
    <nav class="bottom-nav" aria-label="主导航">
      <a class="nav-item" href="./index.html" data-nav="dashboard">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 12.5 12 5l8 7.5"></path>
          <path d="M6.5 10.5V19h11v-8.5"></path>
        </svg>
        <span class="nav-label">仪表盘</span>
      </a>
      <a class="nav-item" href="./logs.html" data-nav="logs">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 6h10"></path>
          <path d="M7 12h10"></path>
          <path d="M7 18h10"></path>
          <path d="M4 6h.01"></path>
          <path d="M4 12h.01"></path>
          <path d="M4 18h.01"></path>
        </svg>
        <span class="nav-label">记录</span>
      </a>
      <a class="nav-item" href="./stats.html" data-nav="stats">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 18h16"></path>
          <path d="M7 15V9"></path>
          <path d="M12 15V6"></path>
          <path d="M17 15v-3"></path>
        </svg>
        <span class="nav-label">趋势</span>
      </a>
      <a class="nav-item" href="./add.html" data-nav="add">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
        <span class="nav-label">新增</span>
      </a>
    </nav>
  </div>

  <script src="./app.js"></script>
</body>
</html>

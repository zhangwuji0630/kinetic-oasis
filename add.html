<body class="bg-background font-body text-on-background selection:bg-primary-container/30">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-stone-50/80 dark:bg-stone-900/80 backdrop-blur-xl">
<div class="flex items-center justify-between px-6 py-4 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-green-700 dark:text-green-400 text-2xl" data-icon="local_gas_station">local_gas_station</span>
<h1 class="font-['Manrope','PingFang_SC'] font-semibold text-lg tracking-tight text-on-surface">加个油吧</h1>
</div>
<div class="flex items-center gap-4">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-stone-200/50 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-stone-500" data-icon="notifications">notifications</span>
</button>
</div>
</div>
</header>
<main class="pt-24 pb-32 px-5 max-w-md mx-auto">
<!-- Smart Paste Area -->
<section class="mb-8">
<div class="bg-primary-container/10 border border-primary-container/20 rounded-lg p-4 flex items-center justify-between group active:scale-[0.98] transition-all cursor-pointer">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined" data-icon="content_paste_go">content_paste_go</span>
</div>
<div>
<p class="text-sm font-semibold text-on-primary-container">智能粘贴填充</p>
<p class="text-xs text-on-primary-container/60">识别短信或笔记中的加油信息</p>
</div>
</div>
<span class="material-symbols-outlined text-on-primary-container/40 group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</div>
</section>
<!-- Form Section -->
<div class="space-y-4">
<!-- Main Grid Bento -->
<div class="grid grid-cols-2 gap-4">
<!-- Amount Card -->
<div class="col-span-2 bg-surface-container-lowest rounded-lg p-5 shadow-sm border border-surface-container-high">
<label class="text-xs font-medium text-on-surface-variant mb-1 block">加油金额 (元)</label>
<div class="flex items-baseline gap-2">
<span class="text-3xl font-bold text-primary tracking-tight">¥</span>
<input class="w-full text-4xl font-bold bg-transparent border-none p-0 focus:ring-0 placeholder:text-surface-container-highest tracking-tighter" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Price Card -->
<div class="bg-surface-container-lowest rounded-lg p-5 shadow-sm border border-surface-container-high">
<label class="text-xs font-medium text-on-surface-variant mb-1 block">当前油价</label>
<div class="flex items-center gap-1">
<input class="w-full text-xl font-semibold bg-transparent border-none p-0 focus:ring-0 placeholder:text-surface-container-highest" placeholder="8.24" type="number"/>
<span class="text-xs text-on-surface-variant font-medium">元/升</span>
</div>
</div>
<!-- Volume Card -->
<div class="bg-surface-container-lowest rounded-lg p-5 shadow-sm border border-surface-container-high">
<label class="text-xs font-medium text-on-surface-variant mb-1 block">加油量</label>
<div class="flex items-center gap-1">
<input class="w-full text-xl font-semibold bg-transparent border-none p-0 focus:ring-0 placeholder:text-surface-container-highest" placeholder="45.0" type="number"/>
<span class="text-xs text-on-surface-variant font-medium">升</span>
</div>
</div>
<!-- Odometer Card -->
<div class="col-span-2 bg-surface-container-lowest rounded-lg p-5 shadow-sm border border-surface-container-high flex items-center justify-between">
<div>
<label class="text-xs font-medium text-on-surface-variant mb-1 block">当前总里程 (公里)</label>
<input class="w-full text-2xl font-bold bg-transparent border-none p-0 focus:ring-0 placeholder:text-surface-container-highest tracking-tight" placeholder="24,580" type="number"/>
</div>
<div class="bg-surface-container-low p-2 rounded-md">
<span class="material-symbols-outlined text-outline" data-icon="speed">speed</span>
</div>
</div>
<!-- Date Card -->
<div class="col-span-2 bg-surface-container-lowest rounded-lg p-5 shadow-sm border border-surface-container-high flex items-center justify-between">
<div>
<label class="text-xs font-medium text-on-surface-variant mb-1 block">日期</label>
<input class="text-lg font-semibold bg-transparent border-none p-0 focus:ring-0 text-on-surface" type="date" value="2023-10-27"/>
</div>
<span class="material-symbols-outlined text-outline" data-icon="calendar_today">calendar_today</span>
</div>
</div>
<!-- Fixed Fuel Type -->
<div class="bg-surface-container-low rounded-lg px-5 py-3 flex items-center justify-between">
<span class="text-sm font-medium text-on-surface-variant">燃油类型</span>
<div class="flex items-center gap-2 px-3 py-1 bg-primary/10 rounded-full border border-primary/20">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<span class="text-sm font-bold text-primary">95#</span>
</div>
</div>
</div>
<!-- Inspiration Card -->
<section class="mt-8">
<div class="bg-primary/5 rounded-md p-4 border-l-4 border-primary/40 relative overflow-hidden">
<span class="material-symbols-outlined absolute -right-2 -top-2 text-primary/5 text-6xl rotate-12" data-icon="format_quote">format_quote</span>
<p class="text-sm text-primary font-medium leading-relaxed italic">“我们要去的地方，不需要路。” ——《回到未来》</p>
<div class="mt-2 flex items-center gap-1.5 opacity-60">
<div class="w-1 h-1 rounded-full bg-primary"></div>
<span class="text-[10px] text-primary tracking-widest uppercase">灵感瞬间</span>
</div>
</div>
</section>
<!-- Main Action Button -->
<div class="mt-10">
<button class="w-full bg-primary text-on-primary py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 active:scale-95 transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="done_all">done_all</span>
                保存记录
            </button>
</div>
</main>

<nav class="fixed bottom-0 w-full z-50 rounded-t-[3rem] pb-safe bg-stone-50/80 dark:bg-stone-900/80 backdrop-blur-xl shadow-[0_-4px_24px_rgba(0,0,0,0.04)] dark:shadow-none">

<span class="font-['PingFang_SC'] font-medium text-[11px] tracking-wide">仪表盘</span>

<a class="flex flex-col items-center justify-center bg-green-500/10 dark:bg-green-400/15 text-green-700 dark:text-green-300 rounded-[2rem] px-5 py-2 active:scale-90 duration-300 ease-out" href="./add.html">
<span class="material-symbols-outlined mb-1" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-['PingFang_SC'] font-medium text-[11px] tracking-wide">记一笔</span>
</a>
<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2 hover:text-green-600 transition-all active:scale-90 duration-300 ease-out" href="./logs.html">
<span class="material-symbols-outlined mb-1" data-icon="history">history</span>
<span class="font-['PingFang_SC'] font-medium text-[11px] tracking-wide">记录</span>

<a class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2 hover:text-green-600 transition-all active:scale-90 duration-300 ease-out" href="./stats.html">
<span class="material-symbols-outlined mb-1" data-icon="equalizer">equalizer</span>
<span class="font-['PingFang_SC'] font-medium text-[11px] tracking-wide">统计</span>

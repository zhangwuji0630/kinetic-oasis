<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Kinetic Oasis 手机版燃油记录 PWA，支持仪表盘、日志、趋势与离线访问。">
  <meta name="theme-color" content="#4d6300">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kinetic Oasis">
  <title>Kinetic Oasis - 仪表盘</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icons/icon-192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="stylesheet" href="./styles.css">
</head>
<body data-page="dashboard" data-nav-group="dashboard">
  <header class="topbar">
    <a class="icon-button" href="./stats.html" aria-label="查看趋势">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 18h16"></path>
        <path d="M7 15V9"></path>
        <path d="M12 15V6"></path>
        <path d="M17 15v-3"></path>
      </svg>
    </a>
    <div class="topbar-brand">
      <span class="brand-mark" aria-hidden="true">KO</span>
      <div class="brand-copy">
        <p class="eyebrow">Fuel Tracker PWA</p>
        <h1 class="brand-title">Kinetic Oasis</h1>
      </div>
    </div>
    <a class="icon-button icon-button-primary" href="./add.html" aria-label="添加记录">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 5v14"></path>
        <path d="M5 12h14"></path>
      </svg>
    </a>
  </header>

  <div class="app-shell">
    <main class="main-stack">
      <p class="notice-banner" id="pageFlash" hidden></p>

      <section class="hero-card hero-primary">
        <div class="hero-layout">
          <div>
            <p class="hero-kicker">本月平均油耗</p>
            <div class="hero-row">
              <h2 class="hero-heading" id="dashboardEfficiency">--</h2>
              <span class="hero-unit">L/100km</span>
            </div>
          </div>
          <div class="hero-chip-row">
            <span class="hero-chip hero-chip-strong" id="dashboardEfficiencyDelta">--</span>
            <span class="hero-chip">当前车辆：<strong id="dashboardVehicleName">Kinetic Oasis</strong></span>
          </div>
        </div>
      </section>

      <section class="metric-grid">
        <article class="metric-card metric-card-accent">
          <p class="metric-label">本月油费</p>
          <p class="metric-value" id="dashboardMonthlySpend">¥ 0.00</p>
        </article>
        <article class="metric-card">
          <p class="metric-label">加油次数</p>
          <p class="metric-value" id="dashboardMonthlyCount">0 次</p>
        </article>
        <article class="metric-card">
          <p class="metric-label">总油量</p>
          <p class="metric-value" id="dashboardMonthlyLiters">0.00 L</p>
        </article>
        <article class="metric-card">
          <p class="metric-label">里程覆盖</p>
          <p class="metric-value" id="dashboardMonthlyDistance">0 km</p>
        </article>
      </section>

      <section class="panel soft">
        <div class="section-head">
          <div>
            <p class="section-title">PWA 安装</p>
            <h2>添加到手机主屏幕</h2>
          </div>
        </div>
        <div class="status-item">
          <div>
            <strong>安装状态</strong>
            <span class="muted" id="installStatus">请在支持的浏览器中打开站点，浏览器满足条件后会给出安装入口。</span>
          </div>
          <button class="button-secondary" id="installButton" type="button" hidden>安装应用</button>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <div>
            <p class="section-title">最近加油</p>
            <h2>最新记录</h2>
          </div>
          <a class="text-link" href="./logs.html">查看全部</a>
        </div>
        <div class="record-list" id="dashboardRecentRecords"></div>
      </section>

      <section class="panel highlight" id="dashboardStationSpotlight"></section>
      <div class="spacer-bottom"></div>
    </main>
  </div>

  <a class="fab" href="./add.html" aria-label="新增记录">
    <svg class="icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 5v14"></path>
      <path d="M5 12h14"></path>
    </svg>
  </a>

  <div class="bottom-nav-wrap">
    <nav class="bottom-nav" aria-label="主导航">
      <a class="nav-item" href="./index.html" data-nav="dashboard">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 12.5 12 5l8 7.5"></path>
          <path d="M6.5 10.5V19h11v-8.5"></path>
        </svg>
        <span class="nav-label">仪表盘</span>
      </a>
      <a class="nav-item" href="./logs.html" data-nav="logs">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 6h10"></path>
          <path d="M7 12h10"></path>
          <path d="M7 18h10"></path>
          <path d="M4 6h.01"></path>
          <path d="M4 12h.01"></path>
          <path d="M4 18h.01"></path>
        </svg>
        <span class="nav-label">记录</span>
      </a>
      <a class="nav-item" href="./stats.html" data-nav="stats">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 18h16"></path>
          <path d="M7 15V9"></path>
          <path d="M12 15V6"></path>
          <path d="M17 15v-3"></path>
        </svg>
        <span class="nav-label">趋势</span>
      </a>
      <a class="nav-item" href="./add.html" data-nav="add">
        <svg class="icon nav-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 5v14"></path>
          <path d="M5 12h14"></path>
        </svg>
        <span class="nav-label">新增</span>
      </a>
    </nav>
  </div>

  <script src="./app.js"></script>
</body>
</html>
